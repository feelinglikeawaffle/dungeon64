<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chaos Dungeon 64 - Procedural 2.5D</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      font-family: monospace;
      color: #fff;
    }
    #gameCanvas {
      display: block;
      margin: 0 auto;
      background: #050509;
      image-rendering: pixelated;
      border: 2px solid #333;
    }
    #overlay {
      position: fixed;
      top: 8px;
      left: 8px;
      font-size: 12px;
      text-shadow: 0 0 4px #000;
      pointer-events: none;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="640" height="360"></canvas>
<div id="overlay">
  CHAOS DUNGEON 64 - PROCEDURAL<br>
  W/S = move, A/D = turn
</div>

<script>
(() => {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  // -----------------------------
  // PROCEDURAL MAP GENERATION
  // -----------------------------
  const MAP_W = 32;
  const MAP_H = 32;
  let map = new Array(MAP_W * MAP_H).fill(1); // start all walls

  function carveRoom(x, y, w, h) {
    for (let iy = y; iy < y + h; iy++) {
      for (let ix = x; ix < x + w; ix++) {
        if (ix > 0 && iy > 0 && ix < MAP_W - 1 && iy < MAP_H - 1) {
          map[iy * MAP_W + ix] = 0;
        }
      }
    }
  }

  function generateMap() {
    // Start with a central room
    carveRoom(14, 14, 4, 4);

    // Carve random rooms
    for (let i = 0; i < 20; i++) {
      const rw = 3 + Math.floor(Math.random() * 6);
      const rh = 3 + Math.floor(Math.random() * 6);
      const rx = Math.floor(Math.random() * (MAP_W - rw - 2)) + 1;
      const ry = Math.floor(Math.random() * (MAP_H - rh - 2)) + 1;
      carveRoom(rx, ry, rw, rh);
    }

    // Carve random corridors
    for (let i = 0; i < 40; i++) {
      const x = Math.floor(Math.random() * MAP_W);
      const y = Math.floor(Math.random() * MAP_H);
      if (x > 1 && x < MAP_W - 1) map[y * MAP_W + x] = 0;
      if (y > 1 && y < MAP_H - 1) map[y * MAP_W + x] = 0;
    }
  }

  generateMap();

  function mapAt(x, y) {
    if (x < 0 || y < 0 || x >= MAP_W || y >= MAP_H) return 1;
    return map[y * MAP_W + x];
  }

  // -----------------------------
  // PLAYER
  // -----------------------------
  const player = {
    x: 16,
    y: 16,
    dirX: 1,
    dirY: 0,
    planeX: 0,
    planeY: 0.66,
    moveSpeed: 3,
    rotSpeed: 2.5
  };

  const keys = {};
  window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
  window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

  // -----------------------------
  // UPDATE
  // -----------------------------
  let lastTime = performance.now();

  function update(dt) {
    if (keys['a']) rotate(-player.rotSpeed * dt);
    if (keys['d']) rotate(player.rotSpeed * dt);

    const move = player.moveSpeed * dt;

    if (keys['w']) {
      const nx = player.x + player.dirX * move;
      const ny = player.y + player.dirY * move;
      if (mapAt(nx | 0, player.y | 0) === 0) player.x = nx;
      if (mapAt(player.x | 0, ny | 0) === 0) player.y = ny;
    }
    if (keys['s']) {
      const nx = player.x - player.dirX * move;
      const ny = player.y - player.dirY * move;
      if (mapAt(nx | 0, player.y | 0) === 0) player.x = nx;
      if (mapAt(player.x | 0, ny | 0) === 0) player.y = ny;
    }
  }

  function rotate(a) {
    const cos = Math.cos(a);
    const sin = Math.sin(a);

    const oldX = player.dirX;
    player.dirX = player.dirX * cos - player.dirY * sin;
    player.dirY = oldX * sin + player.dirY * cos;

    const oldPX = player.planeX;
    player.planeX = player.planeX * cos - player.planeY * sin;
    player.planeY = oldPX * sin + player.planeY * cos;
  }

  // -----------------------------
  // DRAW SKY + FLOOR
  // -----------------------------
  function drawSkyFloor() {
    const horizon = H / 2;
    ctx.fillStyle = "#334";
    ctx.fillRect(0, 0, W, horizon);
    ctx.fillStyle = "#111";
    ctx.fillRect(0, horizon, W, horizon);
  }

  // -----------------------------
  // RAYCAST (SOLID COLORS)
  // -----------------------------
  function castRays() {
    for (let x = 0; x < W; x++) {
      const cameraX = 2 * x / W - 1;
      const rayDirX = player.dirX + player.planeX * cameraX;
      const rayDirY = player.dirY + player.planeY * cameraX;

      let mapX = player.x | 0;
      let mapY = player.y | 0;

      const deltaX = rayDirX === 0 ? 1e30 : Math.abs(1 / rayDirX);
      const deltaY = rayDirY === 0 ? 1e30 : Math.abs(1 / rayDirY);

      let stepX, stepY;
      let sideX, sideY;

      if (rayDirX < 0) {
        stepX = -1;
        sideX = (player.x - mapX) * deltaX;
      } else {
        stepX = 1;
        sideX = (mapX + 1 - player.x) * deltaX;
      }
      if (rayDirY < 0) {
        stepY = -1;
        sideY = (player.y - mapY) * deltaY;
      } else {
        stepY = 1;
        sideY = (mapY + 1 - player.y) * deltaY;
      }

      let hit = 0;
      let side = 0;

      while (!hit) {
        if (sideX < sideY) {
          sideX += deltaX;
          mapX += stepX;
          side = 0;
        } else {
          sideY += deltaY;
          mapY += stepY;
          side = 1;
        }
        if (mapAt(mapX, mapY) === 1) hit = 1;
      }

      let dist;
      if (side === 0) dist = (mapX - player.x + (1 - stepX) / 2) / rayDirX;
      else dist = (mapY - player.y + (1 - stepY) / 2) / rayDirY;

      const lineHeight = (H / dist) | 0;
      let start = (-lineHeight / 2 + H / 2) | 0;
      let end = (lineHeight / 2 + H / 2) | 0;

      if (start < 0) start = 0;
      if (end >= H) end = H - 1;

      const shade = side === 1 ? 0.7 : 1.0;
      const r = (80 * shade) | 0;
      const g = (80 * shade) | 0;
      const b = (160 * shade) | 0;

      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(x, start, 1, end - start);
    }
  }

  // -----------------------------
  // MAIN LOOP
  // -----------------------------
  function loop() {
    const now = performance.now();
    const dt = (now - lastTime) / 1000;
    lastTime = now;

    update(dt);

    ctx.clearRect(0, 0, W, H);
    drawSkyFloor();
    castRays();

    requestAnimationFrame(loop);
  }

  loop();
})();
</script>
</body>
</html>
